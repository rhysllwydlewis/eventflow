<body class="has-admin-navbar admin">
<div id="adminNavbarMount"></div>

<main id="main-content" class="section">
  <!-- Modern Dashboard Header -->
  <div class="dashboard-header">
    <div class="header-content">
      <div>
        <h1 class="dashboard-title">Audit Log</h1>
        <p class="dashboard-subtitle">Track all administrative actions for compliance and security</p>
      </div>
      <div class="header-actions">
        <button class="btn-secondary" id="backToDashboard">← Back to Dashboard</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="data-section">
      <div class="admin-toolbar">
        <select id="actionFilter" class="filter-select">
          <option value="">All Actions</option>
          <option value="user_created">User Created</option>
          <option value="user_suspended">User Suspended</option>
          <option value="user_banned">User Banned</option>
          <option value="user_verified">User Verified</option>
          <option value="supplier_approved">Supplier Approved</option>
          <option value="supplier_verified">Supplier Verified</option>
          <option value="package_approved">Package Approved</option>
          <option value="photo_approved">Photo Approved</option>
          <option value="photo_rejected">Photo Rejected</option>
        </select>
        <select id="targetTypeFilter" class="filter-select">
          <option value="">All Types</option>
          <option value="user">User</option>
          <option value="supplier">Supplier</option>
          <option value="package">Package</option>
          <option value="photo">Photo</option>
          <option value="review">Review</option>
          <option value="report">Report</option>
        </select>
        <input type="date" id="startDateFilter" class="filter-select">
        <input type="date" id="endDateFilter" class="filter-select">
        <button class="btn btn-secondary" id="clearFilters">Clear Filters</button>
        <button class="btn btn-primary" id="exportAuditBtn">📥 Export</button>
      </div>
      
      <div id="auditContainer">
        <p class="small">Loading audit logs...</p>
      </div>
    </div>
  </div>
</main>
