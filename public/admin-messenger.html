<body class="has-admin-navbar admin">
<div id="adminNavbarMount"></div>

<main id="main-content" class="section">
  <div class="dashboard-header">
    <div class="header-content">
      <div>
        <h1 class="dashboard-title">Messenger Moderation</h1>
        <p class="dashboard-subtitle">View and moderate all platform conversations</p>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <!-- Toolbar -->
      <div class="admin-toolbar admin-messenger-toolbar">
        <input type="text" id="messengerSearch" placeholder="Search conversations…"
               class="admin-messenger-search" aria-label="Search conversations">
        <select id="statusFilter" aria-label="Filter by status">
          <option value="">All statuses</option>
          <option value="active">Active</option>
          <option value="archived">Archived</option>
          <option value="deleted">Deleted</option>
        </select>
        <button id="searchBtn" class="btn btn-primary admin-messenger-search-btn">Search</button>
      </div>

      <!-- Results summary -->
      <p id="resultsSummary" class="admin-messenger-summary"></p>

      <!-- Table -->
      <div class="admin-messenger-table-wrap">
        <table class="admin-messenger-table" id="conversationsTable" aria-label="Conversations">
          <thead>
            <tr class="admin-messenger-thead-row">
              <th class="admin-messenger-th">Participants</th>
              <th class="admin-messenger-th">Type</th>
              <th class="admin-messenger-th">Last message</th>
              <th class="admin-messenger-th">Updated</th>
              <th class="admin-messenger-th">Status</th>
              <th class="admin-messenger-th">Actions</th>
            </tr>
          </thead>
          <tbody id="conversationsBody">
            <tr>
              <td colspan="6" class="admin-messenger-state admin-messenger-state--loading">Loading…</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div id="paginationControls" class="admin-messenger-pagination">
        <button id="prevPageBtn" class="btn btn-secondary" disabled>← Prev</button>
        <span id="pageInfo" class="admin-messenger-page-info"></span>
        <button id="nextPageBtn" class="btn btn-secondary" disabled>Next →</button>
      </div>
    </div>
  </div>
</main>
