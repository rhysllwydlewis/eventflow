<!DOCTYPE html>
<html lang="en-GB">
<head>
  <script src="/assets/js/dashboard-guard.js?v=17.0.2"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Search — EventFlow Admin</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="/assets/css/tokens.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/styles.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/eventflow-17.0.0.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/utilities.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/components.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/animations.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/mobile-optimizations.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/admin.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/admin-enhanced.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/admin-navbar.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/admin-cards.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/ui-ux-fixes.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/admin-ui-improvements.css?v=18.3.0">
  <link rel="icon" href="/favicon.svg">
  <script src="/assets/js/components.js?v=18.3.0" defer></script>
  <script src="/assets/js/admin-navbar.js?v=18.3.0" defer></script>
  <style>
    .search-results-section { margin-bottom: 2rem; }
    .search-results-section h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.75rem; color: #374151; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; }
    .search-result-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid #f3f4f6; font-size: 0.9rem; }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #f9fafb; }
    .search-result-primary { font-weight: 600; color: #111827; }
    .search-result-secondary { color: #6b7280; font-size: 0.8rem; margin-top: 0.15rem; }
    .search-result-meta { display: flex; gap: 0.5rem; align-items: center; flex-shrink: 0; }
    .search-no-results { color: #9ca3af; font-style: italic; padding: 1rem; }
    .global-search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .global-search-bar input { flex: 1; padding: 0.75rem 1rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; }
    .global-search-bar button { padding: 0.75rem 1.5rem; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600; }
    .global-search-bar button:hover { background: #1d4ed8; }
    .search-filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
    .search-filter-chip { padding: 0.35rem 0.85rem; border-radius: 9999px; border: 1px solid #d1d5db; background: white; font-size: 0.85rem; cursor: pointer; }
    .search-filter-chip.active { background: #2563eb; color: white; border-color: #2563eb; }
    .search-empty-state { text-align: center; padding: 3rem; color: #9ca3af; }
  </style>
</head>
<body class="has-admin-navbar admin">
<div id="adminNavbarMount"></div>

<main id="main-content" class="section">
  <div class="dashboard-header">
    <div class="header-content">
      <div>
        <h1 class="dashboard-title">Admin Search</h1>
        <p class="dashboard-subtitle">Search across users, suppliers, packages, tickets, and reports</p>
      </div>
      <div class="header-actions">
        <button class="btn-secondary" id="backToDashboard">← Back to Dashboard</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="global-search-bar">
        <input type="text" id="globalSearchInput" placeholder="Search across all entities..." autocomplete="off" aria-label="Search">
        <button id="globalSearchBtn">Search</button>
      </div>
      <div class="search-filters" id="searchFilters">
        <button class="search-filter-chip active" data-type="users">👥 Users</button>
        <button class="search-filter-chip active" data-type="suppliers">🏢 Suppliers</button>
        <button class="search-filter-chip active" data-type="packages">📦 Packages</button>
        <button class="search-filter-chip active" data-type="tickets">🎫 Tickets</button>
        <button class="search-filter-chip active" data-type="reports">📈 Reports</button>
      </div>
    </div>

    <div id="searchResultsContainer">
      <div class="search-empty-state">
        <div style="font-size:3rem;margin-bottom:1rem;">🔍</div>
        <p>Enter a search term above to find users, suppliers, packages, tickets, and reports.</p>
      </div>
    </div>
  </div>
</main>

<footer class="footer" role="contentinfo">
  <div class="container flex-between">
    <div><strong>EventFlow</strong><br><span class="small">Admin Panel</span></div>
    <div class="small"><a href="/admin">Dashboard</a> · <a href="/legal">Legal Hub</a> · <button type="button" data-cookie-prefs>Cookie preferences</button></div>
  </div>
  <div class="small" style="margin-top:8px;text-align:center;">Operated by <a href="https://vexi.co.uk" target="_blank" rel="noopener noreferrer">VEXI</a></div>
</footer>

<script src="/assets/js/admin-shared.js?v=18.3.0"></script>
<script src="/assets/js/pages/admin-search-init.js?v=18.3.0" defer></script>
<script src="/assets/js/cookie-consent.js?v=2.0.0" defer></script>
</body>
</html>
