<!DOCTYPE html>
<html lang="en-GB">
<head>
  <script src="/assets/js/dashboard-guard.js?v=17.0.2"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media Center — EventFlow Admin</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="/assets/css/tokens.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/styles.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/eventflow-17.0.0.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/utilities.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/components.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/animations.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/mobile-optimizations.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/admin.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/admin-enhanced.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/admin-navbar.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/admin-cards.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/ui-ux-fixes.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/admin-ui-improvements.css?v=18.3.0">
  <link rel="stylesheet" href="/assets/css/admin-media.css?v=18.3.0">
  <link rel="icon" href="/favicon.svg">
  <script src="/assets/js/components.js?v=18.3.0" defer></script>
  <script src="/assets/js/admin-navbar.js?v=18.3.0" defer></script>
</head>
<body class="has-admin-navbar admin">
<div id="adminNavbarMount"></div>

<main id="main-content" class="section">
  <!-- Dashboard Header -->
  <div class="dashboard-header">
    <div class="header-content">
      <div>
        <h1 class="dashboard-title">🎨 Media Center</h1>
        <p class="dashboard-subtitle">Browse and select professional stock photos from Pexels for category images and site content</p>
      </div>
      <div class="header-actions">
        <button class="btn-secondary" id="backToDashboard" style="background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);color:white;">← Back to Dashboard</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <!-- Search Bar -->
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search for photos (e.g., 'wedding', 'catering', 'venue')...">
        <button id="searchBtn">Search</button>
        <button id="curatedBtn" class="pexels-btn-secondary">Curated</button>
      </div>

      <!-- Category Quick Search -->
      <div class="category-chips" id="categoryChips"></div>

      <!-- Results Info -->
      <div id="resultsInfo" style="margin-bottom:1rem;color:#666;font-size:0.875rem;"></div>

      <!-- Loading/Error States -->
      <div id="loadingState" class="loading" style="display:none;"><p>Loading photos...</p></div>
      <div id="errorState" class="error" style="display:none;"></div>

      <!-- Photo Grid -->
      <div class="pexels-grid" id="photoGrid"></div>

      <!-- Pagination -->
      <div class="pagination" id="pagination" style="display:none;">
        <button id="prevBtn">← Previous</button>
        <span class="pagination-info" id="pageInfo"></span>
        <button id="nextBtn">Next →</button>
      </div>
    </div>
  </div>
</main>

<!-- Photo Detail Modal -->
<div class="modal" id="photoModal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">×</button>
    <img class="modal-image" id="modalImage" src="" alt="">
    <div class="modal-info">
      <p id="modalPhotographer"></p>
      <p id="modalDimensions"></p>
      <div style="display:flex;gap:0.5rem;margin-top:1rem;">
        <button class="pexels-btn pexels-btn-primary" id="modalCopyUrl">Copy Image URL</button>
        <button class="pexels-btn pexels-btn-secondary" id="modalViewPexels">View on Pexels</button>
      </div>
    </div>
  </div>
</div>

<footer class="footer" role="contentinfo">
  <div class="container flex-between">
    <div><strong>EventFlow</strong><br><span class="small">Admin Panel</span></div>
    <div class="small"><a href="/admin">Dashboard</a> · <a href="/legal">Legal Hub</a> · <button type="button" data-cookie-prefs>Cookie preferences</button></div>
  </div>
  <div class="small" style="margin-top:8px;text-align:center;">Operated by <a href="https://vexi.co.uk" target="_blank" rel="noopener noreferrer">VEXI</a></div>
</footer>

<script src="/assets/js/admin-shared.js?v=18.3.0"></script>
<script src="/assets/js/pages/admin-media-init.js?v=18.3.0" defer></script>
<script src="/assets/js/cookie-consent.js?v=2.0.0" defer></script>
</body>
</html>
