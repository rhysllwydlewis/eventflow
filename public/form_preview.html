<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Package Form Preview</title>
<link rel="stylesheet" href="http://127.0.0.1:4301/assets/css/styles.css">
<link rel="stylesheet" href="http://127.0.0.1:4301/assets/css/supplier-dashboard-improvements.css">
<style>
body { background: #f0f4f8; padding: 40px 20px; margin: 0; }
.page-wrapper { max-width: 860px; margin: 0 auto; }
.section-label { 
  font-size: 11px; font-weight: 600; text-transform: uppercase; 
  letter-spacing: 0.08em; color: #64748b; margin-bottom: 8px;
}
.card { 
  background: #fff; border-radius: 14px; padding: 28px; 
  box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
  margin-bottom: 32px;
}
h3.supplier-section-header { 
  font-size: 14px; font-weight: 600; color: #0b1220;
  margin: 0 0 18px; padding-bottom: 12px;
  border-bottom: 1px solid #e8edf2;
}
</style>
</head>
<body>
<div class="page-wrapper">

  <!-- Normal (create) mode -->
  <div class="section-label">Package Form — Create Mode (no limit)</div>
  <div class="card">
    <div id="package-form-section" class="form-section-collapsible expanded">
      <h3 class="supplier-section-header">Create a package</h3>
      <form id="package-form" action="#">
        <div class="form-row supplier-form-grid">
          <div>
            <label>For supplier</label>
            <select id="pkg-supplier"><option>Blossoms Photography</option></select>
          </div>
          <div>
            <label>Title <span class="form-required">*</span></label>
            <input id="pkg-title" name="title" required placeholder="e.g. Full Day Wedding Coverage" />
          </div>
          <div>
            <label>Price <span class="form-required">*</span></label>
            <input id="pkg-price" name="price" placeholder="e.g. £1,200" required />
          </div>
        </div>
        <div class="form-row supplier-form-grid">
          <div>
            <label>Primary Category <span class="form-required">*</span></label>
            <select id="pkg-category" name="primaryCategoryKey" required>
              <option value="">Choose a category…</option>
              <option value="photography" selected>Photography</option>
              <option value="venues">Venues</option>
              <option value="catering">Catering</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Event Types <span class="required">*</span></label>
            <div class="checkbox-group">
              <label class="checkbox-inline">
                <input type="checkbox" name="eventTypes" value="wedding" class="form-checkbox" checked />
                <span class="checkbox-text">Wedding</span>
              </label>
              <label class="checkbox-inline">
                <input type="checkbox" name="eventTypes" value="other" class="form-checkbox" />
                <span class="checkbox-text">Other Events</span>
              </label>
            </div>
            <p class="form-help">Select at least one</p>
          </div>
        </div>
        <div class="form-row">
          <label>Description</label>
          <textarea id="pkg-desc" rows="3" placeholder="Describe your package…"></textarea>
        </div>
        <div class="form-actions supplier-form-actions" style="margin-top:16px">
          <button class="cta" type="submit">Save package</button>
          <span class="small" id="pkg-status"></span>
        </div>
      </form>
    </div>
  </div>

  <!-- Disabled (at limit) mode -->
  <div class="section-label">Package Form — Create Mode (free-tier limit reached)</div>
  <div class="card">
    <div class="form-section-collapsible expanded">
      <h3 class="supplier-section-header">Create a package</h3>
      <form action="#">
        <div class="form-row supplier-form-grid">
          <div>
            <label>For supplier</label>
            <select disabled><option>Blossoms Photography</option></select>
          </div>
          <div>
            <label>Title <span class="form-required">*</span></label>
            <input disabled placeholder="e.g. Full Day Wedding Coverage" />
          </div>
          <div>
            <label>Price <span class="form-required">*</span></label>
            <input disabled placeholder="e.g. £1,200" />
          </div>
        </div>
        <div class="form-row supplier-form-grid">
          <div>
            <label>Primary Category <span class="form-required">*</span></label>
            <select disabled>
              <option value="">Choose a category…</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Event Types <span class="required">*</span></label>
            <div class="checkbox-group">
              <label class="checkbox-inline">
                <input type="checkbox" disabled class="form-checkbox" />
                <span class="checkbox-text">Wedding</span>
              </label>
              <label class="checkbox-inline">
                <input type="checkbox" disabled class="form-checkbox" />
                <span class="checkbox-text">Other Events</span>
              </label>
            </div>
            <p class="form-help">Select at least one</p>
          </div>
        </div>
        <div class="form-row">
          <label>Description</label>
          <textarea rows="3" disabled placeholder="Describe your package…"></textarea>
        </div>
        <div class="form-actions supplier-form-actions" style="margin-top:16px">
          <button class="cta" type="submit" disabled>Save package</button>
          <span class="small" style="color: #c0392b">
            You have reached the package limit on the free plan. Upgrade to Pro to add more.
          </span>
        </div>
      </form>
    </div>
  </div>

</div>
</body>
</html>
