<body class="has-admin-navbar admin">
<div id="adminNavbarMount"></div>

<main id="main-content" class="section">
  <!-- Modern Dashboard Header -->
  <div class="dashboard-header">
    <div class="header-content">
      <div>
        <h1 class="dashboard-title">Content Reports</h1>
        <p class="dashboard-subtitle">Review user-submitted content reports and take action</p>
      </div>
      <div class="header-actions">
        <button class="btn-secondary" id="backToDashboard">← Back to Dashboard</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="data-section">
      <div class="admin-toolbar">
        <select id="statusFilter" class="filter-select">
          <option value="">All Status</option>
          <option value="pending" selected>Pending</option>
          <option value="resolved">Resolved</option>
          <option value="dismissed">Dismissed</option>
        </select>
        <select id="typeFilter" class="filter-select">
          <option value="">All Types</option>
          <option value="supplier">Supplier</option>
          <option value="review">Review</option>
          <option value="message">Message</option>
          <option value="photo">Photo</option>
          <option value="user">User</option>
        </select>
      </div>
      
      <div id="reportsContainer">
        <p class="small">Loading reports...</p>
      </div>
    </div>
  </div>
</main>
